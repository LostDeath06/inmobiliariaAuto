# =============================================================================
#  nginx: único punto de entrada del sistema.
#   - Sirve el build estático de React.
#   - Hace de reverse proxy a la API (mismo origen -> sin CORS, sin IP horneada).
#   - Aplica autenticación básica a TODO (estáticos, API y docs).
#  El backend y Postgres NO publican puertos al exterior: solo se llega por aquí.
# =============================================================================
server {
    listen 80;
    server_name _;

    # --- Autenticación de acceso ------------------------------------------
    # Cubre todo el server block (se hereda en los location). El fichero lo genera
    # docker-entrypoint-auth.sh a partir de APP_USUARIO / APP_PASSWORD del .env.
    auth_basic           "Sourcing Inmobiliario";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 20m;   # pegar un JSON grande de OpenClaw en modo manual

    # --- API ---------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # La ingesta dispara análisis de Claude en lote: puede tardar minutos.
        proxy_connect_timeout 30s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # --- Swagger / OpenAPI (útil para depurar; también tras la auth) --------
    location = /openapi.json { proxy_pass http://backend:8000/openapi.json; }
    location /docs           { proxy_pass http://backend:8000/docs; }
    location /redoc          { proxy_pass http://backend:8000/redoc; }

    # --- SPA ---------------------------------------------------------------
    # react-router usa rutas de cliente (/inmueble/:id): cualquier ruta que no
    # sea un fichero real debe devolver index.html, o al recargar daría 404.
    location / {
        root      /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Cache larga para los assets con hash; el index.html nunca se cachea.
    location /assets/ {
        root      /usr/share/nginx/html;
        expires   1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        root      /usr/share/nginx/html;
        add_header Cache-Control "no-store";
    }

    gzip              on;
    gzip_types        text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;
}
