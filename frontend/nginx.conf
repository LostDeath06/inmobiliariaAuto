# =============================================================================
#  nginx: único punto de entrada del sistema.
#   - Sirve el build estático de React.
#   - Hace de reverse proxy a la API (mismo origen -> sin CORS, sin IP horneada).
#   - Aplica autenticación básica a TODO (estáticos, API y docs).
#  El backend y Postgres NO publican puertos al exterior: solo se llega por aquí.
# =============================================================================
server {
    listen 80;
    server_name _;

    # --- Resolución del backend (NO tocar a la ligera) ---------------------
    # nginx resuelve los upstream AL CARGAR la config y aborta con
    #   [emerg] host not found in upstream "backend"
    # si el nombre todavía no existe. `depends_on: service_healthy` solo ordena
    # el arranque en `docker compose up`; cuando el VPS se reinicia, Docker
    # relanza los contenedores por su política `restart` SIN respetar ese orden,
    # así que nginx podía arrancar antes que el backend y quedarse en bucle.
    #
    # Solución: DNS embebido de Docker + el upstream en una VARIABLE. Con una
    # variable, nginx NO resuelve al arrancar sino en cada petición: el frontend
    # levanta aunque el backend no exista todavía y se engancha solo en cuanto
    # aparece. Mientras no esté, /api responde 502 y el sitio estático sigue vivo.
    resolver         127.0.0.11 valid=10s ipv6=off;   # 127.0.0.11 = DNS interno de Docker
    resolver_timeout 5s;
    set $backend_upstream backend:8000;

    # --- Autenticación de acceso ------------------------------------------
    # Cubre todo el server block (se hereda en los location). El fichero lo genera
    # docker-entrypoint-auth.sh a partir de APP_USUARIO / APP_PASSWORD del .env.
    auth_basic           "Sourcing Inmobiliario";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 20m;   # pegar un JSON grande de OpenClaw en modo manual

    # --- API ---------------------------------------------------------------
    # Con variable en proxy_pass hay que pasar el URI explícitamente: nginx ya no
    # lo añade solo. $request_uri conserva ruta + query string tal cual llegaron.
    location /api/ {
        proxy_pass http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # La ingesta dispara análisis de Claude en lote: puede tardar minutos.
        proxy_connect_timeout 30s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # --- Swagger / OpenAPI (útil para depurar; también tras la auth) --------
    location = /openapi.json { proxy_pass http://$backend_upstream$request_uri; }
    location /docs           { proxy_pass http://$backend_upstream$request_uri; }
    location /redoc          { proxy_pass http://$backend_upstream$request_uri; }

    # --- SPA ---------------------------------------------------------------
    # react-router usa rutas de cliente (/inmueble/:id): cualquier ruta que no
    # sea un fichero real debe devolver index.html, o al recargar daría 404.
    location / {
        root      /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Cache larga para los assets con hash; el index.html nunca se cachea.
    location /assets/ {
        root      /usr/share/nginx/html;
        expires   1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        root      /usr/share/nginx/html;
        add_header Cache-Control "no-store";
    }

    gzip              on;
    gzip_types        text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;
}
